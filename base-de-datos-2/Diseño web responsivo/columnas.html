<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Ejercicio de Columnas Responsivas - Documentado</title>
    
    <link rel="stylesheet" href="columnas.css">
</head>
<body>

    <br>
    <h2 style="text-align: center">Trabajo Práctico: Diseño Web Responsivo</h2>
    <br>

    <div class="contenedor">
        
        <header class="fila">
            <div id="logo" class="col-log-2">
                <p>Logo (2 col)</p>
            </div>
            
            <div class="col-log-8">
                <p>Encabezado Central (8 col)</p>
            </div>
            
            <div class="col-log-2">
                <p>Redes (2 col)</p>
            </div>
        </header>

        <nav class="fila" style="border: 1px solid black; padding: 20px; background: #f4f4f4; text-align: center; margin-top: 10px;">
            NavBar (Barra de Navegación)
        </nav>

        <section id="seccion3" class="fila" style="border: 1px solid black; padding: 20px; background: #f4f4f4; text-align: center; margin-top: 10px;">
            Sección de Contenido 3
        </section>

        <section id="seccion4" class="fila" style="border: 1px solid black; padding: 20px; background: #f4f4f4; text-align: center; margin-top: 10px;">
            Sección de Contenido 4
        </section>

        <div class="fila">
            <article class="col-4">Servicio A</article>
            <article class="col-4">Servicio B</article>
            <article class="col-4">Servicio C</article>
        </div>

        <footer class="fila" style="border: 1px solid black; padding: 15px; text-align: center; margin-top: 10px;">
            <div class="col-12">
                <p>&copy; 2026 - Clase de Diseño Web Responsivo</p>
            </div>
        </footer>

    </div> </body>
</html>
